<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#08090d"/>
      <stop offset="100%" stop-color="#060709"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#8acb63" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#8acb63" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="92" height="92" patternUnits="userSpaceOnUse">
      <path d="M92,0 L0,0 0,92" fill="none" stroke="rgba(255,255,255,.026)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <ellipse cx="600" cy="310" rx="560" ry="380" fill="url(#glow)"/>

  <!-- Header line -->
  <line x1="60" y1="100" x2="1140" y2="100" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <!-- Footer line -->
  <line x1="60" y1="632" x2="1140" y2="632" stroke="rgba(255,255,255,.06)" stroke-width="1"/>

  <!-- Pittahaya wordmark -->
  <text x="60" y="66" font-family="Georgia,'Times New Roman',serif" font-size="17" letter-spacing="6" fill="#e6bf74" opacity="0.85">PITTAHAYA</text>

  <!-- Category -->
  <text x="1140" y="66" font-family="Helvetica,Arial,sans-serif" font-size="11" letter-spacing="3.5" fill="#b7b5ad" opacity="0.6" text-anchor="end">WEBSITE PACKAGE</text>

  <!-- === GEOMETRIC: Ascending bars (growth) === -->
  <!-- Y-axis -->
  <line x1="472" y1="148" x2="472" y2="410" stroke="rgba(138,203,99,.22)" stroke-width="1"/>
  <!-- X-axis -->
  <line x1="472" y1="410" x2="748" y2="410" stroke="rgba(138,203,99,.22)" stroke-width="1"/>

  <!-- Tick marks on Y axis -->
  <line x1="466" y1="193" x2="472" y2="193" stroke="rgba(138,203,99,.22)" stroke-width="1"/>
  <line x1="466" y1="237" x2="472" y2="237" stroke="rgba(138,203,99,.22)" stroke-width="1"/>
  <line x1="466" y1="280" x2="472" y2="280" stroke="rgba(138,203,99,.22)" stroke-width="1"/>
  <line x1="466" y1="323" x2="472" y2="323" stroke="rgba(138,203,99,.22)" stroke-width="1"/>
  <line x1="466" y1="366" x2="472" y2="366" stroke="rgba(138,203,99,.22)" stroke-width="1"/>

  <!-- Bar 1 (shortest) -->
  <rect x="493" y="322" width="64" height="88" rx="5" fill="rgba(138,203,99,.10)" stroke="#8acb63" stroke-width="1.5" stroke-opacity="0.55"/>
  <!-- Bar 2 (medium) -->
  <rect x="581" y="246" width="64" height="164" rx="5" fill="rgba(138,203,99,.12)" stroke="#8acb63" stroke-width="1.5" stroke-opacity="0.70"/>
  <!-- Bar 3 (tallest) - highlighted -->
  <rect x="669" y="160" width="64" height="250" rx="5" fill="rgba(138,203,99,.18)" stroke="#8acb63" stroke-width="2" stroke-opacity="0.90"/>
  <!-- Glowing cap on tallest bar -->
  <rect x="669" y="160" width="64" height="7" rx="3.5" fill="#8acb63" opacity="0.75"/>
  <ellipse cx="701" cy="160" rx="32" ry="6" fill="#8acb63" opacity="0.25"/>

  <!-- Dot at axis origin -->
  <circle cx="472" cy="410" r="3" fill="#8acb63" opacity="0.5"/>

  <!-- Product name -->
  <text x="600" y="508" font-family="Georgia,'Times New Roman',serif" font-size="68" font-weight="700" fill="#f2f0ea" text-anchor="middle" letter-spacing="-0.5">Starter Website</text>

  <!-- Tagline -->
  <text x="600" y="548" font-family="Helvetica,Arial,sans-serif" font-size="17" fill="#b7b5ad" text-anchor="middle" letter-spacing="2.5" opacity="0.85">START WITH AUTHORITY · PROFESSIONAL FROM DAY ONE</text>

  <!-- Price -->
  <text x="60" y="696" font-family="Georgia,'Times New Roman',serif" font-size="44" fill="#e6bf74">$1,800</text>
  <text x="60" y="724" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#b7b5ad" letter-spacing="2.5" opacity="0.65">CAD · STARTING PRICE</text>

  <!-- Timeline -->
  <text x="1140" y="696" font-family="Helvetica,Arial,sans-serif" font-size="17" fill="#b7b5ad" text-anchor="end" opacity="0.9">3–4 weeks</text>
  <text x="1140" y="720" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#b7b5ad" text-anchor="end" opacity="0.5" letter-spacing="2">FROM KICKOFF TO LAUNCH</text>
</svg>
