<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#090609"/>
      <stop offset="100%" stop-color="#060507"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="58%">
      <stop offset="0%" stop-color="#e83487" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#e6bf74" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e83487" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="diamondGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e83487" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e83487" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="92" height="92" patternUnits="userSpaceOnUse">
      <path d="M92,0 L0,0 0,92" fill="none" stroke="rgba(255,255,255,.026)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <ellipse cx="600" cy="295" rx="560" ry="370" fill="url(#glow)"/>

  <line x1="60" y1="100" x2="1140" y2="100" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <line x1="60" y1="632" x2="1140" y2="632" stroke="rgba(255,255,255,.06)" stroke-width="1"/>

  <text x="60" y="66" font-family="Georgia,'Times New Roman',serif" font-size="17" letter-spacing="6" fill="#e6bf74" opacity="0.85">PITTAHAYA</text>
  <text x="1140" y="66" font-family="Helvetica,Arial,sans-serif" font-size="11" letter-spacing="3.5" fill="#b7b5ad" opacity="0.6" text-anchor="end">WEBSITE PACKAGE · PREMIUM</text>

  <!-- === GEOMETRIC: Diamond gem with facets === -->
  <!-- Soft glow behind diamond -->
  <ellipse cx="600" cy="295" rx="165" ry="155" fill="url(#diamondGlow)"/>

  <!-- Main diamond outline -->
  <polygon points="600,132 752,295 600,458 448,295" fill="rgba(232,52,135,.07)" stroke="rgba(232,52,135,.55)" stroke-width="2"/>

  <!-- Upper facets -->
  <line x1="600" y1="132" x2="524" y2="295" stroke="rgba(232,52,135,.28)" stroke-width="1.2"/>
  <line x1="600" y1="132" x2="676" y2="295" stroke="rgba(232,52,135,.28)" stroke-width="1.2"/>

  <!-- Horizontal girdle line -->
  <line x1="448" y1="295" x2="752" y2="295" stroke="rgba(232,52,135,.20)" stroke-width="1"/>

  <!-- Lower facets -->
  <line x1="524" y1="295" x2="600" y2="458" stroke="rgba(232,52,135,.20)" stroke-width="1"/>
  <line x1="676" y1="295" x2="600" y2="458" stroke="rgba(232,52,135,.20)" stroke-width="1"/>

  <!-- Gold highlight edge (top-right) -->
  <line x1="600" y1="132" x2="752" y2="295" stroke="rgba(230,191,116,.45)" stroke-width="2.5"/>

  <!-- Inner table facet -->
  <polygon points="600,180 700,295 600,390 500,295" fill="rgba(232,52,135,.05)" stroke="rgba(232,52,135,.20)" stroke-width="1"/>

  <!-- Top apex gem glow -->
  <circle cx="600" cy="132" r="6" fill="#e83487" opacity="0.85"/>
  <circle cx="600" cy="132" r="14" fill="#e83487" opacity="0.12"/>

  <!-- Bottom apex -->
  <circle cx="600" cy="458" r="4" fill="rgba(232,52,135,.5)"/>

  <!-- Side apex dots -->
  <circle cx="448" cy="295" r="3.5" fill="rgba(230,191,116,.6)"/>
  <circle cx="752" cy="295" r="3.5" fill="rgba(230,191,116,.6)"/>

  <text x="600" y="508" font-family="Georgia,'Times New Roman',serif" font-size="68" font-weight="700" fill="#f2f0ea" text-anchor="middle" letter-spacing="-0.5">Premium Website</text>
  <text x="600" y="548" font-family="Helvetica,Arial,sans-serif" font-size="17" fill="#b7b5ad" text-anchor="middle" letter-spacing="2.5" opacity="0.85">WHEN THE WEBSITE IS THE BRAND</text>

  <text x="60" y="696" font-family="Georgia,'Times New Roman',serif" font-size="44" fill="#e6bf74">$6,500</text>
  <text x="60" y="724" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#b7b5ad" letter-spacing="2.5" opacity="0.65">CAD · STARTING PRICE</text>

  <text x="1140" y="696" font-family="Helvetica,Arial,sans-serif" font-size="17" fill="#b7b5ad" text-anchor="end" opacity="0.9">6–8 weeks</text>
  <text x="1140" y="720" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#b7b5ad" text-anchor="end" opacity="0.5" letter-spacing="2">FROM DIAGNOSIS TO LAUNCH</text>
</svg>
