<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#08090d"/>
      <stop offset="100%" stop-color="#060708"/>
    </linearGradient>
    <radialGradient id="glow" cx="52%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#e6bf74" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e6bf74" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="92" height="92" patternUnits="userSpaceOnUse">
      <path d="M92,0 L0,0 0,92" fill="none" stroke="rgba(255,255,255,.026)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <ellipse cx="610" cy="275" rx="540" ry="360" fill="url(#glow)"/>

  <line x1="60" y1="100" x2="1140" y2="100" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <line x1="60" y1="632" x2="1140" y2="632" stroke="rgba(255,255,255,.06)" stroke-width="1"/>

  <text x="60" y="66" font-family="Georgia,'Times New Roman',serif" font-size="17" letter-spacing="6" fill="#e6bf74" opacity="0.85">PITTAHAYA</text>
  <text x="1140" y="66" font-family="Helvetica,Arial,sans-serif" font-size="11" letter-spacing="3.5" fill="#b7b5ad" opacity="0.6" text-anchor="end">WEB DESIGN SERVICE</text>

  <!-- === GEOMETRIC: Rocket with trajectory arc === -->

  <!-- Trajectory arc (dashed path) -->
  <path d="M 390,440 Q 480,210 710,148" fill="none" stroke="rgba(230,191,116,.30)" stroke-width="2" stroke-dasharray="8,7"/>

  <!-- Trajectory milestone dots -->
  <circle cx="390" cy="440" r="5" fill="rgba(230,191,116,.35)"/>
  <circle cx="453" cy="340" r="5" fill="rgba(230,191,116,.45)"/>
  <circle cx="546" cy="240" r="5" fill="rgba(230,191,116,.55)"/>
  <circle cx="628" cy="190" r="5" fill="rgba(230,191,116,.65)"/>
  <circle cx="710" cy="148" r="8" fill="#e6bf74" opacity="0.88"/>
  <circle cx="710" cy="148" r="20" fill="#e6bf74" opacity="0.14"/>

  <!-- Launch platform at bottom -->
  <rect x="350" y="440" width="80" height="10" rx="3" fill="rgba(230,191,116,.25)" stroke="rgba(230,191,116,.35)" stroke-width="1"/>
  <rect x="360" y="450" width="60" height="6" rx="2" fill="rgba(230,191,116,.15)"/>
  <rect x="370" y="456" width="40" height="4" rx="2" fill="rgba(230,191,116,.10)"/>

  <!-- Rocket body (at trajectory midpoint, angled ~-50deg) -->
  <g transform="translate(546,232) rotate(-50)">
    <!-- Rocket body -->
    <rect x="-14" y="-42" width="28" height="56" rx="14" fill="rgba(230,191,116,.14)" stroke="rgba(230,191,116,.58)" stroke-width="2"/>
    <!-- Nose cone (pointed top) -->
    <ellipse cx="0" cy="-42" rx="14" ry="8" fill="rgba(230,191,116,.22)" stroke="rgba(230,191,116,.58)" stroke-width="2"/>
    <!-- Window -->
    <circle cx="0" cy="-18" r="7" fill="rgba(230,191,116,.18)" stroke="rgba(230,191,116,.48)" stroke-width="1.5"/>
    <circle cx="0" cy="-18" r="3" fill="rgba(230,191,116,.35)"/>
    <!-- Fins left -->
    <polygon points="-14,10 -28,28 -14,16" fill="rgba(230,191,116,.16)" stroke="rgba(230,191,116,.45)" stroke-width="1.2"/>
    <!-- Fins right -->
    <polygon points="14,10 28,28 14,16" fill="rgba(230,191,116,.16)" stroke="rgba(230,191,116,.45)" stroke-width="1.2"/>
    <!-- Flame / exhaust -->
    <ellipse cx="0" cy="22" rx="10" ry="18" fill="rgba(232,52,135,.28)" stroke="rgba(232,52,135,.45)" stroke-width="1"/>
    <ellipse cx="0" cy="28" rx="6" ry="12" fill="rgba(230,191,116,.25)"/>
  </g>

  <!-- Speed lines (motion effect) -->
  <line x1="490" y1="290" x2="440" y2="310" stroke="rgba(230,191,116,.20)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="502" y1="310" x2="450" y2="335" stroke="rgba(230,191,116,.14)" stroke-width="1" stroke-linecap="round"/>
  <line x1="516" y1="268" x2="468" y2="285" stroke="rgba(230,191,116,.14)" stroke-width="1" stroke-linecap="round"/>

  <!-- Checklist items (what's included, minimal) -->
  <g opacity="0.75">
    <circle cx="776" cy="230" r="5" fill="rgba(138,203,99,.30)" stroke="rgba(138,203,99,.50)" stroke-width="1"/>
    <polyline points="773,230 776,233 781,226" fill="none" stroke="#8acb63" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.80"/>
    <line x1="788" y1="230" x2="850" y2="230" stroke="rgba(255,255,255,.12)" stroke-width="1"/>

    <circle cx="776" cy="254" r="5" fill="rgba(138,203,99,.25)" stroke="rgba(138,203,99,.40)" stroke-width="1"/>
    <polyline points="773,254 776,257 781,250" fill="none" stroke="#8acb63" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.70"/>
    <line x1="788" y1="254" x2="840" y2="254" stroke="rgba(255,255,255,.10)" stroke-width="1"/>

    <circle cx="776" cy="278" r="5" fill="rgba(138,203,99,.20)" stroke="rgba(138,203,99,.35)" stroke-width="1"/>
    <polyline points="773,278 776,281 781,274" fill="none" stroke="#8acb63" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
    <line x1="788" y1="278" x2="856" y2="278" stroke="rgba(255,255,255,.09)" stroke-width="1"/>
  </g>

  <text x="600" y="508" font-family="Georgia,'Times New Roman',serif" font-size="57" font-weight="700" fill="#f2f0ea" text-anchor="middle" letter-spacing="-0.5">Domain &amp; Launch Support</text>
  <text x="600" y="548" font-family="Helvetica,Arial,sans-serif" font-size="17" fill="#b7b5ad" text-anchor="middle" letter-spacing="2.5" opacity="0.85">GO LIVE WITHOUT THE TECHNICAL HEADACHES</text>

  <text x="60" y="696" font-family="Georgia,'Times New Roman',serif" font-size="44" fill="#e6bf74">$800</text>
  <text x="60" y="724" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#b7b5ad" letter-spacing="2.5" opacity="0.65">CAD · STARTING PRICE</text>

  <text x="1140" y="696" font-family="Helvetica,Arial,sans-serif" font-size="17" fill="#b7b5ad" text-anchor="end" opacity="0.9">1–2 weeks</text>
  <text x="1140" y="720" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#b7b5ad" text-anchor="end" opacity="0.5" letter-spacing="2">FULL SETUP</text>
</svg>
