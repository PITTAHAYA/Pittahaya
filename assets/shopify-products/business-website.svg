<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#09090d"/>
      <stop offset="100%" stop-color="#060708"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#e6bf74" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e6bf74" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="92" height="92" patternUnits="userSpaceOnUse">
      <path d="M92,0 L0,0 0,92" fill="none" stroke="rgba(255,255,255,.026)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <ellipse cx="600" cy="300" rx="560" ry="370" fill="url(#glow)"/>

  <line x1="60" y1="100" x2="1140" y2="100" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <line x1="60" y1="632" x2="1140" y2="632" stroke="rgba(255,255,255,.06)" stroke-width="1"/>

  <text x="60" y="66" font-family="Georgia,'Times New Roman',serif" font-size="17" letter-spacing="6" fill="#e6bf74" opacity="0.85">PITTAHAYA</text>
  <text x="1140" y="66" font-family="Helvetica,Arial,sans-serif" font-size="11" letter-spacing="3.5" fill="#b7b5ad" opacity="0.6" text-anchor="end">WEBSITE PACKAGE</text>

  <!-- === GEOMETRIC: Browser / professional site wireframe === -->
  <!-- Outer browser chrome -->
  <rect x="390" y="148" width="420" height="268" rx="8" fill="rgba(230,191,116,.05)" stroke="rgba(230,191,116,.40)" stroke-width="1.8"/>
  <!-- Title bar -->
  <rect x="390" y="148" width="420" height="34" rx="8" fill="rgba(230,191,116,.08)" stroke="none"/>
  <line x1="390" y1="182" x2="810" y2="182" stroke="rgba(230,191,116,.28)" stroke-width="1"/>
  <!-- Window dots -->
  <circle cx="416" cy="165" r="5.5" fill="rgba(230,191,116,.30)"/>
  <circle cx="436" cy="165" r="5.5" fill="rgba(230,191,116,.20)"/>
  <circle cx="456" cy="165" r="5.5" fill="rgba(230,191,116,.14)"/>
  <!-- Address bar -->
  <rect x="472" y="155" width="240" height="18" rx="9" fill="rgba(255,255,255,.05)" stroke="rgba(230,191,116,.15)" stroke-width="1"/>
  <text x="592" y="167.5" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#b7b5ad" opacity="0.5" text-anchor="middle" letter-spacing="0.5">pittahaya.com</text>

  <!-- Hero section inside browser -->
  <rect x="406" y="195" width="392" height="64" rx="0" fill="rgba(230,191,116,.06)"/>
  <rect x="422" y="208" width="180" height="14" rx="3" fill="rgba(230,191,116,.30)"/>
  <rect x="422" y="228" width="240" height="7" rx="2" fill="rgba(255,255,255,.08)"/>
  <rect x="422" y="241" width="200" height="7" rx="2" fill="rgba(255,255,255,.06)"/>

  <!-- Two column content blocks -->
  <rect x="406" y="270" width="188" height="100" rx="3" fill="rgba(230,191,116,.04)" stroke="rgba(230,191,116,.14)" stroke-width="1"/>
  <rect x="602" y="270" width="188" height="100" rx="3" fill="rgba(230,191,116,.04)" stroke="rgba(230,191,116,.14)" stroke-width="1"/>
  <!-- Content lines col 1 -->
  <rect x="420" y="284" width="80" height="8" rx="2" fill="rgba(230,191,116,.22)"/>
  <rect x="420" y="300" width="160" height="6" rx="2" fill="rgba(255,255,255,.07)"/>
  <rect x="420" y="312" width="140" height="6" rx="2" fill="rgba(255,255,255,.05)"/>
  <rect x="420" y="324" width="150" height="6" rx="2" fill="rgba(255,255,255,.05)"/>
  <!-- Content lines col 2 -->
  <rect x="616" y="284" width="80" height="8" rx="2" fill="rgba(230,191,116,.22)"/>
  <rect x="616" y="300" width="160" height="6" rx="2" fill="rgba(255,255,255,.07)"/>
  <rect x="616" y="312" width="130" height="6" rx="2" fill="rgba(255,255,255,.05)"/>
  <rect x="616" y="324" width="150" height="6" rx="2" fill="rgba(255,255,255,.05)"/>
  <!-- CTA button -->
  <rect x="422" y="345" width="110" height="28" rx="14" fill="rgba(230,191,116,.25)" stroke="rgba(230,191,116,.50)" stroke-width="1.2"/>
  <rect x="408" y="386" width="392" height="26" rx="0" fill="rgba(230,191,116,.04)"/>

  <!-- Glow accent line at top of browser -->
  <line x1="390" y1="148" x2="810" y2="148" stroke="rgba(230,191,116,.5)" stroke-width="1.5"/>

  <text x="600" y="508" font-family="Georgia,'Times New Roman',serif" font-size="68" font-weight="700" fill="#f2f0ea" text-anchor="middle" letter-spacing="-0.5">Business Website</text>
  <text x="600" y="548" font-family="Helvetica,Arial,sans-serif" font-size="17" fill="#b7b5ad" text-anchor="middle" letter-spacing="2.5" opacity="0.85">CLEAR ARCHITECTURE · BUILT TO CONVERT</text>

  <text x="60" y="696" font-family="Georgia,'Times New Roman',serif" font-size="44" fill="#e6bf74">$3,500</text>
  <text x="60" y="724" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#b7b5ad" letter-spacing="2.5" opacity="0.65">CAD · STARTING PRICE</text>

  <text x="1140" y="696" font-family="Helvetica,Arial,sans-serif" font-size="17" fill="#b7b5ad" text-anchor="end" opacity="0.9">4–6 weeks</text>
  <text x="1140" y="720" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#b7b5ad" text-anchor="end" opacity="0.5" letter-spacing="2">FROM DIAGNOSIS TO LAUNCH</text>
</svg>
