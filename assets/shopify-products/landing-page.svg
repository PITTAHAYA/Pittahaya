<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#090609"/>
      <stop offset="100%" stop-color="#060507"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#e83487" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#e83487" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="92" height="92" patternUnits="userSpaceOnUse">
      <path d="M92,0 L0,0 0,92" fill="none" stroke="rgba(255,255,255,.026)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <ellipse cx="600" cy="300" rx="520" ry="350" fill="url(#glow)"/>

  <line x1="60" y1="100" x2="1140" y2="100" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <line x1="60" y1="632" x2="1140" y2="632" stroke="rgba(255,255,255,.06)" stroke-width="1"/>

  <text x="60" y="66" font-family="Georgia,'Times New Roman',serif" font-size="17" letter-spacing="6" fill="#e6bf74" opacity="0.85">PITTAHAYA</text>
  <text x="1140" y="66" font-family="Helvetica,Arial,sans-serif" font-size="11" letter-spacing="3.5" fill="#b7b5ad" opacity="0.6" text-anchor="end">WEB DESIGN SERVICE</text>

  <!-- === GEOMETRIC: Conversion funnel === -->
  <!-- Funnel body (wide top → narrow bottom) -->
  <polygon points="415,148 785,148 668,352 532,352" fill="rgba(232,52,135,.09)" stroke="rgba(232,52,135,.48)" stroke-width="1.8"/>

  <!-- Funnel internal flow lines -->
  <line x1="460" y1="200" x2="740" y2="200" stroke="rgba(232,52,135,.18)" stroke-width="1"/>
  <line x1="495" y1="255" x2="705" y2="255" stroke="rgba(232,52,135,.14)" stroke-width="1"/>
  <line x1="520" y1="310" x2="680" y2="310" stroke="rgba(232,52,135,.10)" stroke-width="1"/>

  <!-- Neck / pipe -->
  <rect x="532" y="352" width="136" height="58" rx="2" fill="rgba(232,52,135,.09)" stroke="rgba(232,52,135,.40)" stroke-width="1.8"/>

  <!-- Arrow pointing down (conversion) -->
  <polygon points="565,414 635,414 600,450" fill="#e83487" opacity="0.80"/>
  <line x1="600" y1="450" x2="600" y2="466" stroke="#e83487" stroke-width="2" opacity="0.60"/>

  <!-- Glow dot at top center of funnel (traffic source) -->
  <circle cx="600" cy="148" r="7" fill="#e83487" opacity="0.80"/>
  <circle cx="600" cy="148" r="18" fill="#e83487" opacity="0.12"/>

  <!-- Small visitor dots flowing in -->
  <circle cx="470" cy="132" r="4" fill="rgba(232,52,135,.45)"/>
  <circle cx="520" cy="125" r="3.5" fill="rgba(232,52,135,.35)"/>
  <circle cx="570" cy="122" r="3" fill="rgba(232,52,135,.30)"/>
  <circle cx="630" cy="122" r="3" fill="rgba(232,52,135,.30)"/>
  <circle cx="680" cy="125" r="3.5" fill="rgba(232,52,135,.35)"/>
  <circle cx="730" cy="132" r="4" fill="rgba(232,52,135,.45)"/>

  <!-- CTA label at bottom -->
  <text x="600" y="470" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#e83487" text-anchor="middle" letter-spacing="3" opacity="0.75">CONVERT</text>

  <text x="600" y="508" font-family="Georgia,'Times New Roman',serif" font-size="58" font-weight="700" fill="#f2f0ea" text-anchor="middle" letter-spacing="-0.5">High-Impact Landing Page</text>
  <text x="600" y="548" font-family="Helvetica,Arial,sans-serif" font-size="17" fill="#b7b5ad" text-anchor="middle" letter-spacing="2.5" opacity="0.85">ONE PAGE · ONE GOAL · MAXIMUM CONVERSIONS</text>

  <text x="60" y="696" font-family="Georgia,'Times New Roman',serif" font-size="44" fill="#e6bf74">$2,500</text>
  <text x="60" y="724" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#b7b5ad" letter-spacing="2.5" opacity="0.65">CAD · STARTING PRICE</text>

  <text x="1140" y="696" font-family="Helvetica,Arial,sans-serif" font-size="17" fill="#b7b5ad" text-anchor="end" opacity="0.9">2–3 weeks</text>
  <text x="1140" y="720" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#b7b5ad" text-anchor="end" opacity="0.5" letter-spacing="2">DESIGN TO LIVE</text>
</svg>
