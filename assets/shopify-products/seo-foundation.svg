<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#060a07"/>
      <stop offset="100%" stop-color="#050707"/>
    </linearGradient>
    <radialGradient id="glow" cx="48%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#8acb63" stop-opacity="0.19"/>
      <stop offset="100%" stop-color="#8acb63" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="92" height="92" patternUnits="userSpaceOnUse">
      <path d="M92,0 L0,0 0,92" fill="none" stroke="rgba(255,255,255,.026)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <ellipse cx="575" cy="290" rx="530" ry="360" fill="url(#glow)"/>

  <line x1="60" y1="100" x2="1140" y2="100" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <line x1="60" y1="632" x2="1140" y2="632" stroke="rgba(255,255,255,.06)" stroke-width="1"/>

  <text x="60" y="66" font-family="Georgia,'Times New Roman',serif" font-size="17" letter-spacing="6" fill="#e6bf74" opacity="0.85">PITTAHAYA</text>
  <text x="1140" y="66" font-family="Helvetica,Arial,sans-serif" font-size="11" letter-spacing="3.5" fill="#b7b5ad" opacity="0.6" text-anchor="end">WEB DESIGN SERVICE</text>

  <!-- === GEOMETRIC: Search / SEO magnifier with concentric rings === -->

  <!-- Outer ring (broadest reach) -->
  <circle cx="568" cy="285" r="168" fill="none" stroke="rgba(138,203,99,.11)" stroke-width="1.5"/>
  <!-- Middle ring -->
  <circle cx="568" cy="285" r="112" fill="none" stroke="rgba(138,203,99,.18)" stroke-width="1.5"/>
  <!-- Inner ring -->
  <circle cx="568" cy="285" r="62" fill="rgba(138,203,99,.07)" stroke="rgba(138,203,99,.45)" stroke-width="2"/>

  <!-- Crosshairs inside inner circle -->
  <line x1="520" y1="285" x2="616" y2="285" stroke="rgba(138,203,99,.28)" stroke-width="1"/>
  <line x1="568" y1="237" x2="568" y2="333" stroke="rgba(138,203,99,.28)" stroke-width="1"/>

  <!-- Inner dot (target) -->
  <circle cx="568" cy="285" r="8" fill="#8acb63" opacity="0.75"/>
  <circle cx="568" cy="285" r="16" fill="#8acb63" opacity="0.12"/>

  <!-- Magnifier handle -->
  <line x1="614" y1="331" x2="720" y2="437" stroke="#8acb63" stroke-width="9" stroke-linecap="round" stroke-opacity="0.55"/>
  <line x1="614" y1="331" x2="720" y2="437" stroke="rgba(138,203,99,.15)" stroke-width="18" stroke-linecap="round"/>

  <!-- Ranking indicators (top right area) -->
  <g opacity="0.85">
    <!-- #1 rank badge -->
    <rect x="760" y="152" width="52" height="22" rx="11" fill="rgba(138,203,99,.20)" stroke="rgba(138,203,99,.45)" stroke-width="1"/>
    <text x="786" y="167" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#8acb63" text-anchor="middle" font-weight="700" letter-spacing="0.5">#1</text>

    <!-- #2 -->
    <rect x="760" y="184" width="52" height="22" rx="11" fill="rgba(138,203,99,.11)" stroke="rgba(138,203,99,.25)" stroke-width="1"/>
    <text x="786" y="199" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="rgba(138,203,99,.70)" text-anchor="middle" letter-spacing="0.5">#2</text>

    <!-- #3 -->
    <rect x="760" y="216" width="52" height="22" rx="11" fill="rgba(138,203,99,.07)" stroke="rgba(138,203,99,.16)" stroke-width="1"/>
    <text x="786" y="231" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="rgba(138,203,99,.50)" text-anchor="middle" letter-spacing="0.5">#3</text>
  </g>

  <!-- Upward trend arrow (organic growth) -->
  <polyline points="416,420 445,395 480,400 515,368 550,355 575,335" fill="none" stroke="rgba(138,203,99,.35)" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="568,330 582,330 575,316" fill="rgba(138,203,99,.55)"/>

  <text x="600" y="508" font-family="Georgia,'Times New Roman',serif" font-size="57" font-weight="700" fill="#f2f0ea" text-anchor="middle" letter-spacing="-0.5">SEO Foundation &amp; Optimization</text>
  <text x="600" y="548" font-family="Helvetica,Arial,sans-serif" font-size="17" fill="#b7b5ad" text-anchor="middle" letter-spacing="2.5" opacity="0.85">FOUND BY THE RIGHT PEOPLE · AT THE RIGHT TIME</text>

  <text x="60" y="696" font-family="Georgia,'Times New Roman',serif" font-size="44" fill="#e6bf74">$1,500</text>
  <text x="60" y="724" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#b7b5ad" letter-spacing="2.5" opacity="0.65">CAD · STARTING PRICE</text>

  <text x="1140" y="696" font-family="Helvetica,Arial,sans-serif" font-size="17" fill="#b7b5ad" text-anchor="end" opacity="0.9">2–3 weeks</text>
  <text x="1140" y="720" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#b7b5ad" text-anchor="end" opacity="0.5" letter-spacing="2">SETUP + ONGOING</text>
</svg>
